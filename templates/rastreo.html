<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Seguimiento de Pedido - TiendaMaster</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
</head>
<body class="bg-light d-flex align-items-center" style="min-height: 100vh;">
    <div class="container text-center">
        <div class="card shadow-lg border-0 p-4 mx-auto" style="max-width: 450px;">
            <h2 class="fw-bold mb-3">📦 Mi Pedido</h2>
            <p class="text-muted small">Consulta el estado de tu compra en tiempo real</p>
            
            <form method="POST" action="/rastreo" class="mb-4">
                <div class="input-group">
                    <input type="number" name="pedido_id" class="form-control form-control-lg" placeholder="ID del pedido (ej: 1)" required>
                    <button class="btn btn-primary" type="submit"><i class="bi bi-search"></i></button>
                </div>
            </form>

            {% if pedido %}
                <div class="alert {% if pedido.estado == 'Pendiente' %}alert-warning{% else %}alert-success{% endif %} border-0 shadow-sm py-4">
                    <h5 class="mb-1">Pedido #{{ pedido.id }}</h5>
                    <div class="display-6 fw-bold text-uppercase mb-2">{{ pedido.estado }}</div>
                    <p class="mb-0 small text-muted">Fecha: {{ pedido.fecha.strftime('%d/%m/%Y %H:%M') }}</p>
                </div>
                
                <div class="mt-3">
                    <p class="small text-muted"><strong>Productos:</strong><br>{{ pedido.productos_nombres }}</p>
                </div>
            {% elif error %}
                <div class="alert alert-danger border-0">{{ error }}</div>
            {% endif %}

            <hr>
            <a href="/" class="btn btn-link text-decoration-none text-secondary">← Volver a la tienda</a>
        </div>
    </div>
</body>
</html>
