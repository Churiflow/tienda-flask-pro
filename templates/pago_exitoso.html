<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Compra Exitosa</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light d-flex align-items-center" style="height: 100vh text-center;">
    <div class="container bg-white p-5 rounded shadow text-center" style="max-width: 500px;">
        <h1 class="display-4 text-success">✅</h1>
        <h2>¡Gracias por tu compra!</h2>
        <div class="mt-4 text-center">
            <!-- El número debe ir con código de país, por ejemplo 54 para Argentina, 56 para Chile, 57 Colombia, etc. -->
            <a href="https://wa.me/+56993689737?text={{ mensaje }}" 
               target="_blank" 
               class="btn btn-success btn-lg shadow">
                <i class="bi bi-whatsapp"></i> Confirmar pedido por WhatsApp
            </a>
        </div>
        <p class="lead">Tu pedido ha sido registrado con éxito.</p>
        <div class="alert alert-secondary text-start">
            <strong>Resumen:</strong><br>
            {{ nombres }}<br>
            <strong>Total:</strong> ${{ total }}
        </div>
        <a href="/" class="btn btn-primary w-100">Volver al Inicio</a>
    </div>
</body>
</html>
